name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build desktop app
        run: npm run build --workspace=@deepscan/app

      - name: Package (${{ matrix.platform }})
        run: npm run dist --workspace=@deepscan/app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepscan-${{ matrix.platform }}
          path: apps/garage-copilot-desktop/release/
          retention-days: 14
