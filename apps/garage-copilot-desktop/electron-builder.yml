# electron-builder config. `npm run dist` packages the app for the host OS:
#   - on macOS  → .dmg + .zip
#   - on Windows → NSIS installer (.exe) + .zip
#   - on Linux  → AppImage + .deb
# Each platform must be built on its own OS (electron-builder can't cross-build
# a Mac target off Windows, etc.); the desktop-release workflow does all three on
# native GitHub runners. Output goes to release/ so it doesn't collide with
# esbuild's dist/ bundles.
appId: com.cbaileydev.garagecopilot
productName: Garage Copilot
# Deterministic binary name on Windows/Linux (mac uses the .app bundle name).
executableName: garage-copilot
directories:
  output: release
# Everything the app needs at runtime is bundled into dist/ by esbuild (the
# engine is inlined into the renderer bundle), so only dist/ + package.json ship.
files:
  - dist/**/*
  - package.json
asar: true
# Harden the packaged Electron binary (disables RunAsNode / inspector, etc.).
afterPack: ./build-scripts/configure-fuses.cjs
mac:
  category: public.app-category.utilities
  icon: build/icon.png
  target:
    - dmg
    - zip
  # Unsigned local build. For distribution, configure signing/notarization.
  identity: null
dmg:
  title: Garage Copilot
win:
  icon: build/icon.png
  target:
    - nsis
    - zip
  # Unsigned: Windows SmartScreen will warn until a code-signing cert is added.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-Setup.${ext}
linux:
  icon: build/icon.png
  category: Utility
  synopsis: Read-only OBD-II diagnostics, monitoring, and tune advice
  # The .deb target requires a maintainer; a clean artifact name avoids the
  # scoped package name (@cbaileydev/…) leaking into the file.
  maintainer: CBaileyDev <cbaileydev@users.noreply.github.com>
  artifactName: ${productName}-${version}.${ext}
  target:
    - AppImage
    - deb
